<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ranking ON!</title>

  <style>
    :root{
      --red:#e50914;
      --cyan:#19d3ff;
      --yellow:#ffc400;
      --green:#2bdc63;
      --glass:rgba(0,0,0,.55);
      --border:rgba(255,255,255,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:#fff;
      background:
        linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
        url("fondoranking2.jpg") center/cover fixed;
    }

    .wrap{max-width:980px;margin:0 auto;padding:18px 14px 32px}
    .header{
      position:relative;
      display:flex;align-items:center;gap:14px;
      padding:14px 16px;
      border:1px solid var(--border);
      border-radius:22px;
      background:linear-gradient(180deg,rgba(0,0,0,.70),rgba(0,0,0,.45));
      box-shadow:0 12px 30px rgba(0,0,0,.35);
    }
    .logo{width:70px;height:auto}
    .hgroup{flex:1}
    .title{margin:0;font-size:44px;letter-spacing:2px;font-weight:900;line-height:1}
    .title .on{color:var(--red)}
    .subtitle{margin:6px 0 0;font-size:20px;letter-spacing:5px;color:var(--cyan);font-weight:800}
    .arrowDown{
      width:0;height:0;
      border-left:14px solid transparent;
      border-right:14px solid transparent;
      border-top:20px solid var(--red);
      opacity:.9;
      filter:drop-shadow(0 6px 10px rgba(0,0,0,.5));
    }

    .statusbar{
      margin-top:12px;
      display:flex;justify-content:space-between;gap:12px;
      padding:12px 14px;
      border:1px solid var(--border);
      border-radius:18px;
      background:rgba(0,0,0,.45);
      font-weight:800;
    }
    .dot{
      display:inline-block;width:10px;height:10px;border-radius:999px;
      background:var(--yellow);
      margin-right:8px;
      box-shadow:0 0 12px rgba(255,196,0,.6);
      vertical-align:middle;
    }

    .list{margin-top:14px;display:flex;flex-direction:column;gap:10px}
    .row{
      display:grid;
      grid-template-columns:70px 1fr 210px;
      gap:12px;
      padding:12px 12px;
      border:1px solid var(--border);
      border-radius:18px;
      background:rgba(0,0,0,.42);
      align-items:center;
    }
    .pos{
      font-weight:1000;font-size:28px;
      color:#fff;
      text-shadow:0 6px 16px rgba(0,0,0,.6);
      display:flex;align-items:center;justify-content:center;
    }
    .meta{min-width:0}
    .name{font-weight:900;font-size:18px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .artist{opacity:.85;margin:2px 0 0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .votes{opacity:.9;margin:4px 0 0;font-size:12px}

    .controls{display:flex;gap:8px;justify-content:flex-end;align-items:center;flex-wrap:wrap}
    button{
      appearance:none;border:1px solid var(--border);
      background:rgba(0,0,0,.35);
      color:#fff;
      padding:10px 12px;
      border-radius:14px;
      font-weight:900;
      cursor:pointer;
    }
    button:hover{background:rgba(0,0,0,.55)}
    .play{border-color:rgba(25,211,255,.25)}
    .vote{border-color:rgba(43,220,99,.25)}
    .vote:disabled{opacity:.5;cursor:not-allowed}
    .small{padding:8px 10px;font-size:12px;border-radius:12px}
    .footer{opacity:.9;text-align:center;margin-top:22px;font-weight:800}
    .errbox{
      margin-top:12px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,0,0,.25);
      background:rgba(255,0,0,.08);
      white-space:pre-wrap;
      display:none;
    }

    @media (max-width:720px){
      .title{font-size:34px}
      .subtitle{font-size:16px;letter-spacing:4px}
      .row{grid-template-columns:54px 1fr; grid-auto-rows:auto}
      .controls{grid-column:1 / -1; justify-content:flex-start}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <img class="logo" src="logotipo.png" alt="ON Radio" />
      <div class="hgroup">
        <h1 class="title">RANKING <span class="on">ON!</span></h1>
        <div class="subtitle">VOTÁ TU TEMA FAVORITO</div>
      </div>
      <div class="arrowDown" title="Bajá"></div>
    </div>

    <div class="statusbar">
      <div><span class="dot" id="dot"></span><span id="statusLeft">Conectando...</span></div>
      <div id="statusRight">Esperando datos</div>
    </div>

    <div id="errbox" class="errbox"></div>

    <div class="list" id="list"></div>

    <div class="footer">www.laonradio.com.ar</div>
  </div>

  <script type="module">
    // --- Mostrar errores en pantalla (sirve incluso en celular) ---
    const errbox = document.getElementById("errbox");
    function showErr(msg){
      errbox.style.display = "block";
      errbox.textContent = String(msg);
      console.error(msg);
      setStatus("rojo", "Error", "Mirá el cuadro rojo");
    }
    window.addEventListener("error", (e)=> showErr("ERROR JS:\\n" + (e.message || e.error || e)));
    window.addEventListener("unhandledrejection", (e)=> showErr("PROMESA RECHAZADA:\\n" + (e.reason?.message || e.reason || e)));

    // --- Firebase (Realtime Database) ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    cconst firebaseConfig = {
    apiKey: "AIzaSyC8XXef5k8hLmNL8ufIJsc7Sx5KTlRFdH8",
    authDomain: "on-radio-ranking.firebaseapp.com",
    databaseURL: "https://on-radio-ranking-default-rtdb.firebaseio.com",
    projectId: "on-radio-ranking",
    storageBucket: "on-radio-ranking.firebasestorage.app",
    messagingSenderId: "311635352358",
    appId: "1:311635352358:web:257ff4821987f07d31ffe7"
  };

    // --- UI refs ---
    const listEl = document.getElementById("list");
    const statusLeftEl = document.getElementById("statusLeft");
    const statusRightEl = document.getElementById("statusRight");
    const dotEl = document.getElementById("dot");

    function setStatus(color, left, right){
      statusLeftEl.textContent = left;
      statusRightEl.textContent = right;
      const map = { amarillo: "var(--yellow)", verde:"var(--green)", rojo:"var(--red)", cian:"var(--cyan)" };
      dotEl.style.background = map[color] || "var(--yellow)";
      dotEl.style.boxShadow = color==="rojo" ? "0 0 12px rgba(229,9,20,.7)" :
                              color==="verde" ? "0 0 12px rgba(43,220,99,.7)" :
                              "0 0 12px rgba(255,196,0,.6)";
    }

    // --- Audio control (un solo tema sonando a la vez) ---
    let currentAudio = null;
    let currentBtn = null;

    function togglePlay(btn, url){
      try{
        if(currentAudio && currentAudio.src.endsWith(url) && !currentAudio.paused){
          currentAudio.pause();
          btn.textContent = "▶ Play";
          return;
        }

        if(currentAudio){
          currentAudio.pause();
          if(currentBtn) currentBtn.textContent = "▶ Play";
        }

        const a = new Audio(url);
        currentAudio = a;
        currentBtn = btn;

        btn.textContent = "⏸ Pausa";
        a.addEventListener("ended", ()=> { btn.textContent="▶ Play"; });
        a.addEventListener("pause", ()=> { if(!a.ended) btn.textContent="▶ Play"; });
        a.play().catch(err => showErr("No se pudo reproducir audio:\\n" + err));
      }catch(err){
        showErr(err);
      }
    }

    function audioUrlFromFile(file){
      // mp3 en la misma carpeta del repo
      return "./" + file;
    }

    // --- Init DB ---
    setStatus("amarillo", "Conectando...", "Inicializando Firebase...");
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- Leer y renderizar ---
    const temasRef = ref(db, "temas");

    onValue(temasRef, (snap)=>{
      const data = snap.val();
      if(!data){
        setStatus("amarillo", "Conectado", "Sin datos en /temas");
        listEl.innerHTML = "";
        return;
      }

      const temas = Object.entries(data).map(([id, t]) => ({
        id,
        nombre: t.nombre || id,
        artista: t.artista || "",
        audio: t.audio || "",
        votos: Number(t.votos || 0)
      }));

      temas.sort((a,b)=> b.votos - a.votos);

      setStatus("verde", "Conectado", Cargados: ${temas.length} temas);
      listEl.innerHTML = "";

      temas.forEach((t, idx)=>{
        const row = document.createElement("div");
        row.className = "row";

        const pos = document.createElement("div");
        pos.className = "pos";
        pos.textContent = String(idx+1);

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerHTML = `
          <p class="name">${escapeHtml(t.nombre)}</p>
          <p class="artist">${escapeHtml(t.artista)}</p>
          <p class="votes">Votos: <b>${t.votos}</b></p>
        `;

        const controls = document.createElement("div");
        controls.className = "controls";

        const playBtn = document.createElement("button");
        playBtn.className = "play";
        playBtn.textContent = "▶ Play";
        playBtn.addEventListener("click", ()=>{
          if(!t.audio){
            showErr(Este tema no tiene campo "audio" en Firebase: ${t.id});
            return;
          }
          togglePlay(playBtn, audioUrlFromFile(t.audio));
        });

        const voteBtn = document.createElement("button");
        voteBtn.className = "vote";
        voteBtn.textContent = "✅ Votar";
        voteBtn.addEventListener("click", async ()=>{
          voteBtn.disabled = true;
          try{
            await runTransaction(ref(db, "temas/" + t.id + "/votos"), (curr)=> (Number(curr||0) + 1));
            voteBtn.textContent = "🙏 Gracias!";
            setTimeout(()=> { voteBtn.textContent="✅ Votar"; voteBtn.disabled=false; }, 2000);
          }catch(err){
            voteBtn.disabled = false;
            showErr("Error al votar:\\n" + err);
          }
        });

        controls.appendChild(playBtn);
        controls.appendChild(voteBtn);

        row.appendChild(pos);
        row.appendChild(meta);
        row.appendChild(controls);

        listEl.appendChild(row);
      });

    }, (err)=>{
      showErr("Firebase onValue error:\\n" + err);
    });

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, (c)=>({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[c]));
    }
  </script>
</body>
</html>º
