<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ranking ON</title>

  <style>
    :root{
      --red:#e50914;
      --cyan:#19d3ff;
      --yellow:#ffc400;
      --green:#2bdc63;
      --glass: rgba(0,0,0,.55);
      --border: rgba(255,255,255,.10);
      --text: #fff;
      --muted: rgba(255,255,255,.75);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: var(--text);
      background:
        linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.75)),
        url("fondoranking2.jpg") center/cover fixed;
      min-height:100vh;
    }

    .wrap{
      width:min(980px, 94vw);
      margin:18px auto 30px;
    }

    .header{
      background: rgba(0,0,0,.55);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 16px 16px;
      display:flex;
      align-items:center;
      gap:14px;
      position:relative;
      overflow:hidden;
      backdrop-filter: blur(6px);
    }

    .logo{
      width:64px; height:64px;
      object-fit:contain;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,.6));
      flex: 0 0 auto;
    }

    .titleBox{ flex:1; text-align:center; }
    .title{
      margin:0;
      font-size: clamp(28px, 4.2vw, 46px);
      font-weight: 900;
      letter-spacing: 2px;
    }
    .title .on{ color:#ff4b55; }
    .subtitle{
      margin: 4px 0 0;
      font-size: clamp(14px, 2.2vw, 20px);
      font-weight: 800;
      letter-spacing: 4px;
      color: var(--cyan);
    }

    .arrow{
      width:0; height:0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 22px solid #c4121a;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,.8));
      margin-right:8px;
      flex: 0 0 auto;
      opacity:.95;
      transform: translateY(2px);
    }

    .statusBar{
      margin:14px 0 14px;
      background: rgba(0,0,0,.50);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      backdrop-filter: blur(6px);
    }
    .statusLeft{
      display:flex; align-items:center; gap:10px;
      font-weight: 800;
      color: var(--muted);
    }
    .dot{
      width:12px; height:12px; border-radius:50%;
      background: var(--yellow);
      box-shadow: 0 0 18px rgba(255,196,0,.55);
    }
    .statusRight{
      font-weight: 800;
      color: var(--muted);
    }

    .list{
      display:flex;
      flex-direction:column;
      gap: 12px;
      padding-bottom: 12px;
    }

    .row{
      background: rgba(0,0,0,.55);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px 12px;
      display:grid;
      grid-template-columns: 52px 1fr auto;
      gap: 10px;
      align-items:center;
      backdrop-filter: blur(6px);
    }

    .pos{
      width:52px; height:52px;
      border-radius: 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 900;
      font-size: 20px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
    }

    .meta{
      min-width: 0;
    }
    .song{
      font-size: 16px;
      font-weight: 900;
      line-height: 1.15;
      margin:0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .artist{
      margin:4px 0 0;
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions{
      display:flex;
      align-items:center;
      gap: 10px;
    }

    .btn{
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: #fff;
      padding: 10px 12px;
      border-radius: 14px;
      font-weight: 900;
      cursor:pointer;
      user-select:none;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .btn:hover{ background: rgba(255,255,255,.10); }

    .btnPlay{
      min-width: 96px;
      justify-content:center;
    }

    .btnVote{
      background: rgba(229,9,20,.18);
      border-color: rgba(229,9,20,.35);
    }
    .btnVote:hover{
      background: rgba(229,9,20,.26);
    }

    .votes{
      font-weight: 900;
      color: var(--cyan);
      min-width: 52px;
      text-align:right;
    }

    .toast{
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.75);
      border: 1px solid rgba(255,255,255,.14);
      padding: 10px 12px;
      border-radius: 14px;
      font-weight: 800;
      display:none;
      z-index: 9999;
      max-width: 92vw;
    }

    .footer{
      margin: 16px 0 0;
      text-align:center;
      font-weight: 900;
      color: rgba(255,255,255,.85);
      letter-spacing: 1px;
    }

    /* Debug box (si querés ocultarlo, ponelo en display:none) */
    #debug{
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      max-height: 34vh;
      overflow:auto;
      background: rgba(0,0,0,.82);
      border:1px solid rgba(255,255,255,.18);
      border-radius: 14px;
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      display:none; /* poné block si querés ver errores en el celu */
      z-index: 99999;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <img class="logo" src="logotipo.png" alt="ON Radio" />
      <div class="titleBox">
        <h1 class="title">RANKING <span class="on">ON!</span></h1>
        <div class="subtitle">VOTÁ TU TEMA FAVORITO</div>
      </div>
      <div class="arrow" aria-hidden="true"></div>
    </div>

    <div class="statusBar">
      <div class="statusLeft">
        <div id="dot" class="dot"></div>
        <div id="statusLeft">Conectando…</div>
      </div>
      <div id="statusRight" class="statusRight">Esperando datos</div>
    </div>

    <div id="list" class="list"></div>

    <div class="footer">www.laonradio.com.ar</div>
  </div>

  <div id="toast" class="toast"></div>
  <pre id="debug"></pre>

  <script type="module">
    // ======= DEBUG VISUAL (opcional) =======
    const debugBox = document.getElementById("debug");
    const dbg = (...args) => {
      const msg = args.map(a => typeof a === "string" ? a : JSON.stringify(a, null, 2)).join(" ");
      debugBox.textContent += msg + "\\n";
      // debugBox.style.display = "block"; // descomentá para verlo siempre
    };

    window.addEventListener("error", (e) => {
      dbg("ERROR JS:", e.message || e.error || e);
      debugBox.style.display = "block";
    });
    window.addEventListener("unhandledrejection", (e) => {
      dbg("PROMISE REJECTED:", e.reason?.message || e.reason || e);
      debugBox.style.display = "block";
    });

    // ======= Firebase v9 (module) =======
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    // ⚠️ PEGÁ ACÁ TU firebaseConfig COMPLETO (SIN "..." )
    const firebaseConfig = { 
apiKey: "AIzaSyC8XXef5k8hLmNL8ufIJsc7Sx5KTlRFdH8",
    authDomain: "on-radio-ranking.firebaseapp.com",
    databaseURL: "https://on-radio-ranking-default-rtdb.firebaseio.com",
    projectId: "on-radio-ranking",
    storageBucket: "on-radio-ranking.firebasestorage.app",
    messagingSenderId: "311635352358",
    appId: "1:311635352358:web:257ff4821987f07d31ffe7"
  };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ======= UI refs =======
    const listEl = document.getElementById("list");
    const statusLeftEl = document.getElementById("statusLeft");
    const statusRightEl = document.getElementById("statusRight");
    const dotEl = document.getElementById("dot");
    const toastEl = document.getElementById("toast");

    // ======= helpers =======
    const setStatus = (color, left, right) => {
      dotEl.style.background = color;
      statusLeftEl.textContent = left;
      statusRightEl.textContent = right;
    };

    const toast = (msg) => {
      toastEl.textContent = msg;
      toastEl.style.display = "block";
      setTimeout(() => toastEl.style.display = "none", 2200);
    };

    // Solo 1 voto por tema por día (por dispositivo)
    const todayKey = () => {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      const day = String(d.getDate()).padStart(2,"0");
      return onrank_${y}${m}${day};
    };

    const canVote = (id) => {
      const key = todayKey();
      const raw = localStorage.getItem(key);
      const obj = raw ? JSON.parse(raw) : {};
      return !obj[id];
    };

    const markVoted = (id) => {
      const key = todayKey();
      const raw = localStorage.getItem(key);
      const obj = raw ? JSON.parse(raw) : {};
      obj[id] = true;
      localStorage.setItem(key, JSON.stringify(obj));
    };

    // Un solo audio reproduciendo
    const player = new Audio();
    player.preload = "none";
    let nowPlayingId = null;

    const playFile = async (id, filename) => {
      try{
        if(!filename){
          toast("Este tema no tiene audio asignado 😅");
          return;
        }

        // Ruta a mp3 en el repo (en la raíz del /ON-Radio/)
        const url = ./${filename};

        if(nowPlayingId === id && !player.paused){
          player.pause();
          return;
        }

        nowPlayingId = id;
        player.src = url;
        await player.play();
      }catch(err){
        dbg("Audio error:", err?.message || err);
        toast("No pude reproducir este audio.");
      }
    };

    // ======= Render =======
    const render = (items) => {
      listEl.innerHTML = "";

      items.forEach((t, idx) => {
        const row = document.createElement("div");
        row.className = "row";

        const pos = document.createElement("div");
        pos.className = "pos";
        pos.textContent = String(idx + 1);

        const meta = document.createElement("div");
        meta.className = "meta";

        const song = document.createElement("p");
        song.className = "song";
        song.textContent = t.nombre || "(sin nombre)";

        const artist = document.createElement("p");
        artist.className = "artist";
        artist.textContent = t.artista || "";

        meta.appendChild(song);
        meta.appendChild(artist);

        const actions = document.createElement("div");
        actions.className = "actions";

        const btnPlay = document.createElement("button");
        btnPlay.className = "btn btnPlay";
        btnPlay.textContent = (nowPlayingId === t.id && !player.paused) ? "⏸ Pausa" : "▶ Play";
        btnPlay.addEventListener("click", () => {
          playFile(t.id, t.audio);
          // refresco rápido del texto
          setTimeout(() => render(items), 150);
        });

        const btnVote = document.createElement("button");
        btnVote.className = "btn btnVote";
        btnVote.textContent = canVote(t.id) ? "VOTAR" : "VOTADO ✅";
        btnVote.disabled = !canVote(t.id);
        btnVote.addEventListener("click", async () => {
          if(!canVote(t.id)){
            toast("Ya votaste este tema hoy 😉");
            return;
          }

          try{
            const votesRef = ref(db, temas/${t.id}/votos);
            await runTransaction(votesRef, (current) => (Number(current) || 0) + 1);
            markVoted(t.id);
            toast("¡Gracias por votar! Volvé mañana 🙌");
          }catch(err){
            dbg("Vote error:", err?.message || err);
            toast("No pude registrar el voto.");
          }
        });

        const votes = document.createElement("div");
        votes.className = "votes";
        votes.textContent = String(t.votos ?? 0);

        actions.appendChild(btnPlay);
        actions.appendChild(btnVote);
        actions.appendChild(votes);

        row.appendChild(pos);
        row.appendChild(meta);
        row.appendChild(actions);

        listEl.appendChild(row);
      });
    };

    // ======= Firebase listen =======
    setStatus("var(--yellow)", "Conectando…", "Esperando datos");

    const temasRef = ref(db, "temas");
    onValue(temasRef, (snap) => {
      const data = snap.val();

      if(!data){
        setStatus("var(--yellow)", "Conectado", "Sin datos en /temas");
        listEl.innerHTML = "";
        toast("Firebase está ok, pero /temas está vacío.");
        return;
      }

      const items = Object.entries(data).map(([id, obj]) => ({
        id,
        nombre: obj?.nombre || "",
        artista: obj?.artista || "",
        audio: obj?.audio || "",     // <-- acá tiene que venir "chorro.mp3", "hacecalor.mp3", etc.
        votos: Number(obj?.votos || 0),
      }));

      // Orden automático por votos DESC
      items.sort((a,b) => b.votos - a.votos);

      setStatus("var(--green)", "Conectado", Cargados: ${items.length} temas);
      render(items);
    }, (err) => {
      dbg("Firebase onValue error:", err?.message || err);
      setStatus("var(--red)", "Error", "No puedo leer Firebase");
      toast("Error leyendo Firebase.");
    });

    // Cuando termina un audio, refrescar botones
    player.addEventListener("ended", () => {
      nowPlayingId = null;
    });
    player.addEventListener("pause", () => {
      // re-render leve
      // (no lo hago agresivo para no parpadear)
    });
  </script>
</body>
</html>
