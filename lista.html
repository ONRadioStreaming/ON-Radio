<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Ranking ON</title>

<style>
:root{
  --red:#e50914;
  --cyan:#19d3ff;
  --yellow:#ffc400;
  --green:#2bdc63;

  --glass:rgba(0,0,0,.55);
  --border:rgba(255,255,255,.10);
  --shadow:0 14px 30px rgba(0,0,0,.55);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  color:#fff;
  background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
    url("fondoranking2.jpg") center/cover fixed;
}

.wrap{
  max-width:980px;
  margin:0 auto;
  padding:14px 12px 26px;
}

/* Header PRO */
.topbar{
  position:relative;
  border-radius:24px;
  padding:14px 14px;
  background:rgba(0,0,0,.65);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.topbar::after{
  content:"";
  position:absolute; inset:-40px;
  background:
    radial-gradient(circle at 20% 0%, rgba(229,9,20,.18), transparent 45%),
    radial-gradient(circle at 85% 35%, rgba(25,211,255,.16), transparent 45%);
  pointer-events:none;
}

.topbarInner{
  position:relative;
  display:grid;
  grid-template-columns:86px 1fr 64px;
  align-items:center;
  gap:10px;
}

.logo{
  width:70px;
  height:auto;
  display:block;
  filter:drop-shadow(0 8px 12px rgba(0,0,0,.55));
  justify-self:start;
}

.headText{
  text-align:center;
}
.headTitle{
  margin:0;
  font-weight:900;
  letter-spacing:2px;
  font-size:clamp(28px,4.8vw,44px);
  text-shadow:0 10px 18px rgba(0,0,0,.6);
  line-height:1.05;
}
.headTitle .on{ color:#ff4450; }
.headSub{
  margin:6px 0 0;
  font-weight:900;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--cyan);
  text-shadow:0 0 14px rgba(25,211,255,.25);
  animation:pulse 2.4s ease-in-out infinite;
  font-size:clamp(14px,2.8vw,18px);
}
@keyframes pulse{ 0%,100%{opacity:.95} 50%{opacity:.70} }

.arrowDown{
  justify-self:end;
  width:0;height:0;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-top:22px solid var(--red);
  filter:drop-shadow(0 10px 16px rgba(0,0,0,.6));
  animation:arrowMove 1.2s ease-in-out infinite, arrowBlink 1.2s ease-in-out infinite;
}
@keyframes arrowMove{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(10px)} }
@keyframes arrowBlink{ 0%,100%{opacity:1} 50%{opacity:.65} }

/* Lista */
.list{
  margin-top:14px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.row{
  display:grid;
  grid-template-columns:66px 76px 1fr 26px 150px;
  align-items:center;
  gap:12px;
  padding:14px;
  border-radius:20px;
  background:var(--glass);
  border:1px solid var(--border);
  box-shadow:0 16px 30px rgba(0,0,0,.45);
  backdrop-filter:blur(6px);
}

.row.top1{
  border:1px solid rgba(229,9,20,.40);
  box-shadow:0 0 22px rgba(229,9,20,.20);
}

.num{
  font-family:"Benjamin Gothic Heavy",Impact,Arial Black;
  font-weight:900;
  text-align:center;
  font-size:38px;
  opacity:.95;
}
.row.top1 .num{
  font-size:48px;
  color:var(--red);
}

/* Play/Pause real */
.play{
  width:72px;height:72px;
  border-radius:999px;
  border:2px solid rgba(255,255,255,.24);
  background:rgba(0,0,0,.22);
  display:grid;
  place-items:center;
  cursor:pointer;
  user-select:none;
}
.play:active{ transform:scale(.98); }

.playIcon{
  width:0;height:0;
  border-left:16px solid #fff;
  border-top:10px solid transparent;
  border-bottom:10px solid transparent;
  margin-left:4px;
}
.pauseIcon{
  width:18px;height:18px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}
.pauseIcon span{
  background:#fff;
  border-radius:2px;
  display:block;
}

/* Texto */
.song{
  font-weight:900;
  font-size:24px;
  margin:0;
  line-height:1.05;
}
.artist{
  margin:6px 0 0;
  font-size:16px;
  opacity:.80;
  line-height:1.15;
}

/* Trend */
.trend{
  width:18px;height:18px;
  display:grid;
  place-items:center;
  filter:drop-shadow(0 8px 12px rgba(0,0,0,.55));
  font-weight:900;
}
.trend.up{ color:var(--green); }
.trend.down{ color:var(--red); }
.trend.stable{ color:var(--yellow); }

/* Votar */
.vote{
  width:150px;
  height:54px;
  border:0;
  border-radius:999px;
  background:linear-gradient(180deg, #e50914, #b40810);
  color:#fff;
  font-weight:900;
  letter-spacing:1px;
  cursor:pointer;
  box-shadow:0 14px 26px rgba(229,9,20,.25);
}
.vote:disabled{
  opacity:.45;
  cursor:not-allowed;
}

/* Footer */
.footer{
  text-align:center;
  padding:14px 0 8px;
  font-weight:800;
  opacity:.8;
  letter-spacing:1px;
}

/* Toast simple (no el cartel feo) */
.toast{
  position:fixed;
  left:12px; right:12px; bottom:12px;
  max-width:980px;
  margin:0 auto;
  display:none;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:14px;
  background:rgba(0,0,0,.75);
  border:1px solid rgba(255,255,255,.10);
  box-shadow:var(--shadow);
  font-weight:700;
}
.dot{ width:10px;height:10px;border-radius:999px;background:var(--yellow); }
.dot.ok{ background:var(--green); }
.dot.bad{ background:var(--red); }

@media(max-width:720px){
  .topbarInner{ grid-template-columns:74px 1fr 56px; }
  .logo{ width:62px; }

  .row{ grid-template-columns:56px 66px 1fr 22px 126px; padding:12px; }
  .play{ width:64px; height:64px; }
  .song{ font-size:20px; }
  .artist{ font-size:14px; }
  .vote{ width:126px; height:50px; font-size:16px; }
  .num{ font-size:34px; }
  .row.top1 .num{ font-size:44px; }
}
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <div class="topbarInner">
      <img src="logotipo.png" class="logo" alt="ON Radio">
      <div class="headText">
        <h1 class="headTitle">RANKING <span class="on">ON!</span></h1>
        <div class="headSub">VOTÁ TU TEMA FAVORITO</div>
      </div>
      <div class="arrowDown" aria-hidden="true"></div>
    </div>
  </div>

  <div class="list" id="list"></div>
  <div class="footer">www.laonradio.com.ar</div>
</div>

<div class="toast" id="toast">
  <span class="dot" id="toastDot"></span>
  <span id="toastText">Cargando…</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyC8XXef5k8hLmNL8ufIJsc7Sx5KTlRFdH8",
    authDomain: "on-radio-ranking.firebaseapp.com",
    databaseURL: "https://on-radio-ranking-default-rtdb.firebaseio.com",
    projectId: "on-radio-ranking",
    storageBucket: "on-radio-ranking.firebasestorage.app",
    messagingSenderId: "311635352358",
    appId: "1:311635352358:web:257ff4821987f07d31ffe7"
  };

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const temasRef = ref(db, "temas");

const list = document.getElementById("list");
const toastEl = document.getElementById("toast");
const toastText = document.getElementById("toastText");
const toastDot = document.getElementById("toastDot");

function toast(msg, type="info", ms=1200){
  toastText.textContent = msg;
  toastDot.className = "dot" + (type==="ok" ? " ok" : type==="bad" ? " bad" : "");
  toastEl.style.display = "flex";
  clearTimeout(toastEl._t);
  toastEl._t = setTimeout(()=> toastEl.style.display="none", ms);
}

/* ✅ 1 voto por día TOTAL (no por tema) */
function today(){ return new Date().toISOString().slice(0,10); }
function votedToday(){ return localStorage.getItem("on_vote")==today(); }
function lockVote(){ localStorage.setItem("on_vote", today()); }

/* ✅ Tendencia: compara contra el orden anterior guardado */
const LS_KEY = "onradio_prev_order_v1";
function getPrev(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)||"[]"); }catch{ return []; } }
function setPrev(arr){ try{ localStorage.setItem(LS_KEY, JSON.stringify(arr)); }catch{} }

function trendSymbol(prevIds, id, newIndex){
  const prevIndex = prevIds.indexOf(id);
  if(prevIndex === -1) return {cls:"stable", sym:"■"}; // primera vez
  if(prevIndex > newIndex) return {cls:"up", sym:"▲"};
  if(prevIndex < newIndex) return {cls:"down", sym:"▼"};
  return {cls:"stable", sym:"■"};
}

/* ✅ Audio global con play/pause real */
const audio = new Audio();
let currentId = null;
let currentBtn = null;

function setBtnPlay(btn){
  btn.innerHTML = '<div class="playIcon"></div>';
  btn.dataset.state = "play";
}
function setBtnPause(btn){
  btn.innerHTML = '<div class="pauseIcon"><span></span><span></span></div>';
  btn.dataset.state = "pause";
}

audio.addEventListener("ended", ()=>{
  if(currentBtn) setBtnPlay(currentBtn);
  currentId = null;
  currentBtn = null;
});

function audioUrl(filename){
  // robusto para /ON-Radio/ + espacios
  return new URL(filename, window.location.href).href;
}

toast("Conectando…", "info", 900);

onValue(temasRef, (snap)=>{
  const data = snap.val();
  if(!data){
    list.innerHTML = "";
    toast("No hay datos en /temas", "bad", 1800);
    return;
  }

  const temas = Object.entries(data).map(([id,t])=>({
    id,
    nombre: t?.nombre || id,
    artista: t?.artista || "",
    audio: t?.audio || "",
    votos: Number(t?.votos || 0)
  }));

  temas.sort((a,b)=> b.votos - a.votos);

  const prevOrder = getPrev();
  const newOrder = temas.map(t=>t.id);
  setPrev(newOrder);

  list.innerHTML = "";

  temas.forEach((t,i)=>{
    const row = document.createElement("div");
    row.className = "row" + (i===0 ? " top1" : "");

    const tr = trendSymbol(prevOrder, t.id, i);

    row.innerHTML = `
      <div class="num">${i+1}</div>

      <div class="play" data-state="play" title="Reproducir / Pausar">
        <div class="playIcon"></div>
      </div>

      <div>
        <p class="song">${escapeHtml(t.nombre)}</p>
        <p class="artist">${escapeHtml(t.artista)}</p>
      </div>

      <div class="trend ${tr.cls}" title="Movimiento">${tr.sym}</div>

      <button class="vote" ${votedToday() ? "disabled" : ""}>VOTAR</button>
    `;

    const playBtn = row.querySelector(".play");
    const voteBtn = row.querySelector(".vote");

    playBtn.addEventListener("click", ()=>{
      if(!t.audio){
        toast("Este tema no tiene audio", "bad", 1600);
        return;
      }

      // Si toco el MISMO: toggle pause/play
      if(currentId === t.id){
        if(audio.paused){
          audio.play().catch(()=> toast("No se pudo reproducir", "bad", 1600));
          setBtnPause(playBtn);
        }else{
          audio.pause();
          setBtnPlay(playBtn);
        }
        return;
      }

      // Si toco OTRO: detener anterior y reproducir este
      if(currentBtn) setBtnPlay(currentBtn);
      currentId = t.id;
      currentBtn = playBtn;

      audio.src = audioUrl(t.audio);
      audio.currentTime = 0;
      audio.play().then(()=> setBtnPause(playBtn))
        .catch(()=> {
          toast("No se pudo reproducir", "bad", 1600);
          setBtnPlay(playBtn);
          currentId = null;
          currentBtn = null;
        });
    });

    voteBtn.addEventListener("click", async ()=>{
      if(votedToday()){
        toast("Ya votaste hoy. Volvé mañana.", "bad", 1600);
        return;
      }

      voteBtn.disabled = true;
      try{
        await runTransaction(ref(db, "temas/"+t.id+"/votos"), v => (Number(v||0)+1));
        lockVote();
        toast("Gracias por votar 🙌 Volvé mañana.", "ok", 1700);

        // Deshabilito TODOS los botones (1 voto total)
        document.querySelectorAll(".vote").forEach(b=> b.disabled = true);
      }catch(e){
        console.error(e);
        voteBtn.disabled = false;
        toast("No se pudo votar (reglas/permisos)", "bad", 1900);
      }
    });

    list.appendChild(row);
  });

  toast("Actualizado", "ok", 850);

}, (err)=>{
  console.error(err);
  toast("Error al leer Firebase", "bad", 2200);
});

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
</script>
</body>
</html>
