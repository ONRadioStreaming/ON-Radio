<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ranking ON</title>

  <style>
    :root{
      --bg1: rgba(0,0,0,.70);
      --bg2: rgba(0,0,0,.78);
      --glass: rgba(0,0,0,.55);
      --border: rgba(255,255,255,.08);
      --shadow: 0 10px 30px rgba(0,0,0,.55);

      --red: #e50914;
      --cyan: #19d3ff;
      --yellow: #ffc400;
      --green: #2bdc63;
      --muted: rgba(255,255,255,.70);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:#fff;
      background:
        linear-gradient(var(--bg1), var(--bg2)),
        url("fondoranking2.jpg") center/cover fixed;
      min-height: 100vh;
    }

    /* Contenedor general */
    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 12px 28px;
    }

    /* Barra superior */
    .topbar{
      position: relative;
      border-radius: 26px;
      padding: 18px 16px;
      background: linear-gradient(180deg, rgba(0,0,0,.75), rgba(0,0,0,.60));
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.08);
      overflow: hidden;
    }
    .topbar::after{
      content:"";
      position:absolute; inset:-40px;
      background: radial-gradient(circle at 20% 0%, rgba(229,9,20,.18), transparent 45%),
                  radial-gradient(circle at 85% 35%, rgba(25,211,255,.16), transparent 45%);
      pointer-events:none;
    }

    .topbar-inner{
      position: relative;
      display:flex;
      align-items:center;
      gap: 14px;
      justify-content: space-between;
    }

    .brand{
      display:flex;
      align-items:center;
      gap: 14px;
      min-width: 120px;
    }
    .brand img{
      width: 58px;
      height: auto;
      display:block;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.6));
    }

    .titlebox{
      text-align:center;
      flex: 1;
      padding: 0 8px;
    }
    .title{
      margin:0;
      font-weight: 900;
      letter-spacing: 2px;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.05;
      text-shadow: 0 8px 18px rgba(0,0,0,.65);
    }
    .title .on{
      color: #ff4450;
    }
    .subtitle{
      margin: 6px 0 0;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--cyan);
      font-size: clamp(14px, 2.8vw, 18px);
      text-transform: uppercase;
      animation: pulseText 2.6s ease-in-out infinite;
    }
    @keyframes pulseText{
      0%,100%{ opacity: .95; filter: drop-shadow(0 0 0 rgba(25,211,255,0)); }
      50%{ opacity: .70; filter: drop-shadow(0 0 10px rgba(25,211,255,.25)); }
    }

    .arrow{
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 20px solid #d61a1a;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.65));
      animation: arrowFloat 1.25s ease-in-out infinite;
      margin-right: 6px;
      flex: 0 0 auto;
    }
    @keyframes arrowFloat{
      0%,100%{ transform: translateY(0); opacity: .95; }
      50%{ transform: translateY(8px); opacity: .75; }
    }

    /* Lista */
    .list{
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card{
      border-radius: 22px;
      background: rgba(0,0,0,.55);
      border: 1px solid var(--border);
      box-shadow: 0 12px 26px rgba(0,0,0,.55);
      padding: 14px 14px;
      display: grid;
      grid-template-columns: 64px 76px 1fr 36px 160px;
      gap: 12px;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .card::before{
      content:"";
      position:absolute; inset:0;
      background: radial-gradient(circle at 20% 50%, rgba(229,9,20,.10), transparent 40%),
                  radial-gradient(circle at 80% 30%, rgba(25,211,255,.08), transparent 45%);
      pointer-events:none;
    }

    .pos{
      position: relative;
      font-weight: 900;
      text-align:center;
      text-shadow: 0 10px 18px rgba(0,0,0,.65);
    }
    .pos.one{
      color: var(--red);
      font-size: 46px;
    }
    .pos.other{
      color: #fff;
      font-size: 38px;
      opacity: .95;
    }

    .playbtn{
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.25);
      display:grid;
      place-items:center;
      cursor:pointer;
      transition: transform .12s ease, border-color .12s ease;
      user-select:none;
    }
    .playbtn:active{ transform: scale(.97); }
    .playbtn:hover{ border-color: rgba(255,255,255,.28); }

    .playicon{
      width: 0;
      height: 0;
      border-left: 16px solid rgba(255,255,255,.85);
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      margin-left: 4px;
    }
    .pauseicon{
      width: 18px;
      height: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }
    .pauseicon span{
      display:block;
      background: rgba(255,255,255,.85);
      border-radius: 2px;
    }

    .meta{
      position: relative;
      min-width: 0;
    }
    .song{
      margin:0;
      font-size: 28px;
      font-weight: 900;
      line-height: 1.05;
      text-shadow: 0 10px 18px rgba(0,0,0,.65);
      word-break: break-word;
    }
    .artist{
      margin: 6px 0 0;
      color: var(--muted);
      font-weight: 700;
      font-size: 18px;
      line-height: 1.15;
      word-break: break-word;
    }

    .move{
      position: relative;
      width: 22px;
      height: 22px;
      display:grid;
      place-items:center;
      font-weight: 900;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.6));
    }
    .move.up{ color: var(--green); }
    .move.down{ color: var(--red); }
    .move.stable{ color: var(--yellow); }

    .vote{
      position: relative;
      justify-self: end;
      width: 160px;
      height: 54px;
      border: 0;
      border-radius: 999px;
      font-weight: 900;
      letter-spacing: 1px;
      font-size: 18px;
      color: #fff;
      background: linear-gradient(180deg, #e50914, #b40810);
      box-shadow: 0 14px 26px rgba(229,9,20,.25);
      cursor: pointer;
      transition: transform .12s ease, filter .12s ease;
    }
    .vote:active{ transform: scale(.98); }
    .vote[disabled]{ opacity:.55; cursor:not-allowed; filter: grayscale(.2); }

    /* Footer */
    .footer{
      margin-top: 16px;
      text-align:center;
      color: rgba(255,255,255,.75);
      font-weight: 800;
      letter-spacing: 1px;
    }

    /* Toast */
    .toast{
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      max-width: 980px;
      margin: 0 auto;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(0,0,0,.75);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: var(--shadow);
      display:none;
      align-items:center;
      gap: 10px;
      color: rgba(255,255,255,.92);
      font-weight: 700;
    }
    .dot{
      width: 10px; height: 10px;
      border-radius: 999px;
      background: var(--yellow);
      box-shadow: 0 0 0 6px rgba(255,196,0,.10);
      flex: 0 0 auto;
    }
    .dot.ok{ background: var(--green); box-shadow: 0 0 0 6px rgba(43,220,99,.10); }
    .dot.bad{ background: var(--red); box-shadow: 0 0 0 6px rgba(229,9,20,.10); }

    /* Responsive: celulares */
    @media (max-width: 720px){
      .brand img{ width: 52px; }
      .card{
        grid-template-columns: 56px 66px 1fr 26px 126px;
        padding: 12px 12px;
      }
      .playbtn{ width: 64px; height: 64px; }
      .song{ font-size: 24px; }
      .artist{ font-size: 16px; }
      .vote{ width: 126px; height: 50px; font-size: 16px; }
      .pos.one{ font-size: 42px; }
      .pos.other{ font-size: 34px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <img src="logotipo.png" alt="ON Radio" />
        </div>

        <div class="titlebox">
          <h1 class="title">RANKING <span class="on">ON!</span></h1>
          <div class="subtitle">VOTÁ TU TEMA FAVORITO</div>
        </div>

        <div class="arrow" aria-hidden="true"></div>
      </div>
    </div>

    <div class="list" id="list"></div>

    <div class="footer">www.laonradio.com.ar</div>
  </div>

  <div class="toast" id="toast">
    <span class="dot" id="toastDot"></span>
    <span id="toastText">Cargando…</span>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    // ✅ Tu firebaseConfig (el de tu captura). Si algún día cambia, pegalo acá tal cual.
    const firebaseConfig = {
      apiKey: "AIzaSyC8XXef5k8hLmNL8ufIJsc7Sx5KTlRFdH8",
      authDomain: "on-radio-ranking.firebaseapp.com",
      databaseURL: "https://on-radio-ranking-default-rtdb.firebaseio.com",
      projectId: "on-radio-ranking",
      storageBucket: "on-radio-ranking.firebasestorage.app",
      messagingSenderId: "311635352358",
      appId: "1:311635352358:web:257ff4821987f07d31ffe7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const listEl = document.getElementById("list");
    const toastEl = document.getElementById("toast");
    const toastText = document.getElementById("toastText");
    const toastDot = document.getElementById("toastDot");

    function toast(msg, type="info", ms=1400){
      toastText.textContent = msg;
      toastDot.className = "dot" + (type==="ok" ? " ok" : type==="bad" ? " bad" : "");
      toastEl.style.display = "flex";
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(()=> toastEl.style.display="none", ms);
    }

    // 🎵 Un solo audio sonando a la vez
    let currentAudio = null;
    let currentBtn = null;

    function stopCurrent(){
      if(currentAudio){
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      if(currentBtn){
        currentBtn.dataset.state = "play";
        currentBtn.innerHTML = '<div class="playicon"></div>';
      }
      currentAudio = null;
      currentBtn = null;
    }

    function makePauseIcon(){
      return '<div class="pauseicon"><span></span><span></span></div>';
    }

    // 🔁 Movimiento según orden anterior (localStorage)
    const LS_KEY = "onradio_last_order_v1";
    function getLastOrder(){
      try { return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); } catch { return []; }
    }
    function setLastOrder(arr){
      try { localStorage.setItem(LS_KEY, JSON.stringify(arr)); } catch {}
    }

    function moveIndicator(prevIds, id, newIndex){
      const prevIndex = prevIds.indexOf(id);
      if(prevIndex === -1) return { cls: "stable", symbol: "■" }; // primera vez
      if(prevIndex > newIndex) return { cls: "up", symbol: "▲" };
      if(prevIndex < newIndex) return { cls: "down", symbol: "▼" };
      return { cls: "stable", symbol: "■" };
    }

    // 🧱 Render
    function render(temasObj){
      const entries = Object.entries(temasObj || {}).map(([id, v]) => ({
        id,
        nombre: v?.nombre || id,
        artista: v?.artista || "",
        audio: v?.audio || "",
        votos: Number(v?.votos || 0)
      }));

      entries.sort((a,b)=> b.votos - a.votos);

      const prevOrder = getLastOrder();
      const newOrder = entries.map(t=>t.id);
      setLastOrder(newOrder);

      listEl.innerHTML = "";
      entries.forEach((t, idx) => {
        const pos = idx + 1;

        const mi = moveIndicator(prevOrder, t.id, idx);

        const card = document.createElement("div");
        card.className = "card";

        const posEl = document.createElement("div");
        posEl.className = "pos " + (pos===1 ? "one" : "other");
        posEl.textContent = pos;

        const play = document.createElement("div");
        play.className = "playbtn";
        play.dataset.state = "play";
        play.innerHTML = '<div class="playicon"></div>';

        // audio está en el repo (misma carpeta que lista.html)
        const audioUrl = t.audio ? (./${encodeURIComponent(t.audio)}) : null;

        play.addEventListener("click", () => {
          if(!audioUrl){
            toast("Este tema no tiene audio", "bad", 1600);
            return;
          }

          // Si tocás otro tema → freno el anterior
          if(currentBtn && currentBtn !== play){
            stopCurrent();
          }

          // Si todavía no existe, lo creo
          if(!currentAudio){
            currentAudio = new Audio(audioUrl);
            currentAudio.addEventListener("ended", () => stopCurrent());
          } else {
            // si era el mismo tema, currentAudio ya existe
          }

          // Si era el mismo botón, toggle
          if(currentBtn === play){
            if(play.dataset.state === "pause"){
              currentAudio.pause();
              play.dataset.state = "play";
              play.innerHTML = '<div class="playicon"></div>';
            } else {
              currentAudio.play().catch(()=> toast("No se pudo reproducir", "bad", 1600));
              play.dataset.state = "pause";
              play.innerHTML = makePauseIcon();
            }
            return;
          }

          // Nuevo tema
          currentBtn = play;
          currentAudio.src = audioUrl;
          currentAudio.currentTime = 0;
          currentAudio.play().then(()=>{
            play.dataset.state = "pause";
            play.innerHTML = makePauseIcon();
          }).catch(()=>{
            toast("No se pudo reproducir", "bad", 1600);
            stopCurrent();
          });
        });

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.innerHTML = `
          <p class="song">${escapeHtml(t.nombre)}</p>
          <p class="artist">${escapeHtml(t.artista)}</p>
        `;

        const mov = document.createElement("div");
        mov.className = move ${mi.cls};
        mov.textContent = mi.symbol;

        const vote = document.createElement("button");
        vote.className = "vote";
        vote.textContent = "VOTAR";

        vote.addEventListener("click", async () => {
          vote.disabled = true;
          try{
            const votosRef = ref(db, temas/${t.id}/votos);
            await runTransaction(votosRef, (cur) => (Number(cur||0) + 1));
            toast("¡Voto registrado! Gracias 🙌", "ok", 1400);
          }catch(err){
            console.error(err);
            toast("No se pudo votar (revisá permisos)", "bad", 1800);
          }finally{
            setTimeout(()=> vote.disabled = false, 700);
          }
        });

        card.appendChild(posEl);
        card.appendChild(play);
        card.appendChild(meta);
        card.appendChild(mov);
        card.appendChild(vote);

        listEl.appendChild(card);
      });
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    // 🔥 Firebase listener
    toast("Conectando…", "info", 900);

    const temasRef = ref(db, "temas");
    onValue(temasRef, (snap) => {
      const data = snap.val();
      if(!data){
        render({});
        toast("Sin datos en /temas", "bad", 2000);
        return;
      }
      render(data);
      // No muestro “conectado/cargados” fijo: solo un toast corto
      toast("Actualizado", "ok", 900);
    }, (err) => {
      console.error(err);
      toast("Error al leer Firebase", "bad", 2500);
    });

    // Si hay errores JS, los muestro (te ayuda a cazar lo que rompe)
    window.addEventListener("error", (e)=>{
      console.error("JS ERROR:", e?.message || e);
    });
    window.addEventListener("unhandledrejection", (e)=>{
      console.error("PROMISE REJECTION:", e?.reason || e);
    });
  </script>
</body>
</html>
