<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Ranking ON</title>

  <style>
    :root{
      --red:#e50914;
      --cyan:#19d3ff;
      --yellow:#ffc400;
      --green:#2bdc63;
      --bg:#070707;
      --glass: rgba(0,0,0,.55);
      --border: rgba(255,255,255,.10);
      --shadow: 0 14px 30px rgba(0,0,0,.55);
      --cardShadow: 0 16px 28px rgba(0,0,0,.45);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
      background: var(--bg) url("fondoranking2.jpg") center/cover fixed no-repeat;
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 16px 14px 40px;
    }

    /* Header */
    .header{
      position: relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding: 16px 16px;
      border-radius: 22px;
      background: rgba(0,0,0,.65);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 64px;
    }

    .brand img{
      width:60px;
      height:auto;
      display:block;
      filter: drop-shadow(0 10px 14px rgba(0,0,0,.55));
    }

    .titleBox{
      flex:1;
      text-align:center;
      line-height:1.05;
      user-select:none;
    }
    .titleBox .t1{
      font-weight:900;
      letter-spacing:.12em;
      font-size: 34px;
    }
    .titleBox .t1 span{ color:#ff6a6a; }
    .titleBox .t2{
      margin-top: 8px;
      font-weight:800;
      letter-spacing:.20em;
      color: var(--cyan);
      font-size: 16px;
      text-transform: uppercase;
      animation: subtleBlink 1.8s ease-in-out infinite;
    }
    .titleBox .t3{
      margin-top: 10px;
      font-weight:700;
      opacity:.9;
      letter-spacing:.06em;
    }

    @keyframes subtleBlink{
      0%,100%{ opacity:.95; transform: translateY(0); }
      50%{ opacity:.60; transform: translateY(1px); }
    }

    .arrowDown{
      width:0;height:0;
      border-left:14px solid transparent;
      border-right:14px solid transparent;
      border-top:22px solid var(--red);
      filter: drop-shadow(0 10px 16px rgba(0,0,0,.6));
      animation: arrowMove 1.2s ease-in-out infinite, arrowBlink 1.2s ease-in-out infinite;
      margin-right: 6px;
    }
    @keyframes arrowMove{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(6px); }
    }
    @keyframes arrowBlink{
      0%,100%{ opacity:1; }
      50%{ opacity:.55; }
    }

    /* List */
    .list{
      margin-top: 14px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .row{
      display:grid;
      grid-template-columns: 72px 78px 1fr 28px 160px;
      align-items:center;
      gap:12px;
      padding: 14px 14px;
      border-radius: 22px;
      background: var(--glass);
      border: 1px solid var(--border);
      box-shadow: var(--cardShadow);
      backdrop-filter: blur(6px);
      min-height: 92px;
    }

    .row.top1{
      border: 1px solid rgba(229,9,20,.45);
      box-shadow: 0 0 0 1px rgba(229,9,20,.25), var(--cardShadow);
    }

    .num{
      font-weight: 900;
      font-size: 46px;
      text-align:center;
      opacity:.95;
      letter-spacing:.02em;
    }
    .row.top1 .num{ color: #ff6a6a; font-size: 52px; }
    .row:not(.top1) .num{ color:#fff; }

    .playBtn{
      width:72px;height:72px;
      border-radius: 999px;
      display:grid;
      place-items:center;
      border: 2px solid rgba(255,255,255,.20);
      background: rgba(0,0,0,.35);
      cursor:pointer;
      transition: transform .08s ease;
      user-select:none;
    }
    .playBtn:active{ transform: scale(.98); }

    .playIcon{
      width:0;height:0;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      border-left: 16px solid rgba(255,255,255,.75);
      margin-left: 4px;
    }
    .pauseIcon{
      width:16px;height:18px;
      display:flex;
      gap:4px;
    }
    .pauseIcon span{
      width:6px;height:18px;
      background: rgba(255,255,255,.75);
      border-radius:2px;
    }

    .meta{
      min-width: 0;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .song{
      font-weight:900;
      font-size: 22px;
      line-height: 1.1;
      word-break: break-word;
    }
    .artist{
      font-weight:650;
      opacity:.9;
      font-size: 15px;
      line-height:1.2;
      word-break: break-word;
    }

    .trend{
      width:14px;height:14px;
      border-radius:3px;
      background: var(--yellow);
      margin: 0 auto;
      box-shadow: 0 0 0 2px rgba(0,0,0,.25);
    }
    .trend.up{
      width:0;height:0;border-radius:0;
      border-left:8px solid transparent;
      border-right:8px solid transparent;
      border-bottom:14px solid var(--green);
      background:transparent;
      box-shadow:none;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.55));
    }
    .trend.down{
      width:0;height:0;border-radius:0;
      border-left:8px solid transparent;
      border-right:8px solid transparent;
      border-top:14px solid var(--red);
      background:transparent;
      box-shadow:none;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.55));
    }

    .vote{
      width: 150px;
      height: 54px;
      border-radius: 999px;
      border: 0;
      background: var(--red);
      color:#fff;
      font-weight: 900;
      letter-spacing:.08em;
      font-size: 16px;
      cursor:pointer;
      box-shadow: 0 10px 18px rgba(0,0,0,.45);
      transition: transform .08s ease, filter .15s ease;
    }
    .vote:active{ transform: scale(.98); }
    .vote[disabled]{
      opacity:.55;
      cursor:not-allowed; /* esto muestra el símbolo de prohibido */
      filter: grayscale(.3);
    }

    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(0,0,0,.75);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(8px);
      padding: 10px 14px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 14px;
      opacity:0;
      pointer-events:none;
      transition: opacity .2s ease, transform .2s ease;
      box-shadow: 0 16px 26px rgba(0,0,0,.45);
      z-index: 9999;
      max-width: 92vw;
      text-align:center;
    }
    .toast.show{
      opacity:1;
      transform: translateX(-50%) translateY(-4px);
    }

    /* Mobile fix (la clave de tu problema visual) */
    @media (max-width: 520px){
      .wrap{ padding: 12px 10px 34px; }
      .header{ padding: 14px 12px; border-radius: 18px; }
      .brand img{ width:54px; }
      .titleBox .t1{ font-size: 28px; letter-spacing:.10em; }
      .titleBox .t2{ font-size: 14px; letter-spacing:.18em; }
      .titleBox .t3{ display:none; } /* chau www en mobile */

      .row{
        grid-template-columns: 50px 56px 1fr;
        grid-template-rows: auto auto;
        gap:10px;
        padding: 12px 12px;
        border-radius: 18px;
        min-height: 0;
      }

      .num{
        grid-column: 1;
        grid-row: 1 / span 2;
        font-size: 38px;
      }
      .row.top1 .num{ font-size: 44px; }

      .playBtn{
        grid-column: 2;
        grid-row: 1 / span 2;
        width:52px;height:52px;
      }

      .meta{
        grid-column: 3;
        grid-row: 1;
        gap:4px;
      }
      .song{ font-size: 19px; }
      .artist{ font-size: 13px; }

      .trend{
        grid-column: 3;
        grid-row: 2;
        justify-self: start;
        margin: 0;
      }

      .vote{
        grid-column: 3;
        grid-row: 2;
        justify-self: end;
        width: 112px;
        height: 44px;
        font-size: 15px;
      }

.footer{
    text-align:center;
    margin:50px 0 30px 0;
    font-size:15px;
    color:#ccc;
    letter-spacing:1px;
}

  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <div class="brand">
        <img src="logotipo.png" alt="ON Radio">
      </div>

      <div class="titleBox">
        <div class="t1">RANKING <span>ON!</span></div>
        <div class="t2">VOTÁ TU TEMA FAVORITO</div>
      </div>

      <div class="arrowDown" aria-hidden="true"></div>
    </div>

    <div id="list" class="list"></div>
    <div class="footer">www.laonradio.com.ar</div>    

  <div id="toast" class="toast"></div>

  <audio id="player" preload="none"></audio>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    // ✅ TU firebaseConfig (tal cual lo mostraste)
    const firebaseConfig = {
      apiKey: "AIzaSyC8XXef5k8hLmNL8ufI3sc7Sx5KT1RFdH8",
      authDomain: "on-radio-ranking.firebaseapp.com",
      databaseURL: "https://on-radio-ranking-default-rtdb.firebaseio.com",
      projectId: "on-radio-ranking",
      storageBucket: "on-radio-ranking.firebasestorage.app",
      messagingSenderId: "311635352358",
      appId: "1:311635352358:web:257ff4821987f07d31ffe7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const listEl = document.getElementById("list");
    const toastEl = document.getElementById("toast");
    const player = document.getElementById("player");

    let currentKeyPlaying = null;

    function toast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(()=>toastEl.classList.remove("show"), 1700);
    }

    function audioUrl(filename){
      // MP3 en el mismo directorio que lista.html
      return "./" + filename;
    }


    function arDateKey(){
  return new Intl.DateTimeFormat('en-CA', {
    timeZone: 'America/Argentina/Buenos_Aires',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  }).format(new Date());
}

function canVote(){
  const today = arDateKey();
  return !localStorage.getItem("onrank_voted_" + today);
}

function lockVote(){
  const today = arDateKey();
  localStorage.setItem("onrank_voted_" + today, "1");
}

    function loadPrevOrder(){
      try { return JSON.parse(localStorage.getItem("onrank_prevOrder") || "{}"); }
      catch { return {}; }
    }
    function savePrevOrder(map){
      localStorage.setItem("onrank_prevOrder", JSON.stringify(map));
    }

    function trendClass(prevPos, newPos){
      if (!prevPos) return "stable";
      if (newPos < prevPos) return "up";
      if (newPos > prevPos) return "down";
      return "stable";
    }

    function render(items){
      const prev = loadPrevOrder();
      const newMap = {};

      listEl.innerHTML = "";

      items.forEach((it, idx)=>{
        const pos = idx + 1;
        newMap[it.key] = pos;

        const row = document.createElement("div");
        row.className = "row" + (pos === 1 ? " top1" : "");

        const num = document.createElement("div");
        num.className = "num";
        num.textContent = pos;

        const playBtn = document.createElement("div");
        playBtn.className = "playBtn";
        playBtn.title = "Reproducir / Pausar";

        const iconWrap = document.createElement("div");
        iconWrap.className = "playIcon";
        playBtn.appendChild(iconWrap);

        const meta = document.createElement("div");
        meta.className = "meta";

        const song = document.createElement("div");
        song.className = "song";
        song.textContent = it.nombre || it.key;

        const artist = document.createElement("div");
        artist.className = "artist";
        artist.textContent = it.artista || "";

        meta.appendChild(song);
        meta.appendChild(artist);

        const tr = document.createElement("div");
        const cls = trendClass(prev[it.key], pos);
        tr.className = "trend" + (cls === "stable" ? "" : " " + cls);

        const vote = document.createElement("button");
        vote.className = "vote";
        vote.textContent = "VOTAR";

        // Si querés “una vez por día”, bloqueamos visualmente
        if (!canVote(it.key)) vote.disabled = true;

        playBtn.addEventListener("click", ()=>{
          const src = audioUrl(it.audio || "");
          if (!it.audio){
            toast("Este tema no tiene audio cargado");
            return;
          }

          // Si clickeo el mismo que está sonando → toggle
          if (currentKeyPlaying === it.key){
            if (player.paused){
              player.play().catch(()=>toast("No pude reproducir (autoplay bloqueado)"));
              iconWrap.className = "pauseIcon";
              iconWrap.innerHTML = "<span></span><span></span>";
            } else {
              player.pause();
              iconWrap.className = "playIcon";
              iconWrap.innerHTML = "";
            }
            return;
          }

          // Nuevo tema: reseteo player e íconos
          currentKeyPlaying = it.key;
          player.pause();
          player.currentTime = 0;
          player.src = src;
          player.play().catch(()=>toast("No pude reproducir (tocá play otra vez)"));

          // Pongo icono pause en este, play en el resto (re-render simple)
          document.querySelectorAll(".playBtn > div").forEach(d=>{
            d.className = "playIcon";
            d.innerHTML = "";
          });
          iconWrap.className = "pauseIcon";
          iconWrap.innerHTML = "<span></span><span></span>";
        });

        vote.addEventListener("click", async ()=>{
          if (!canVote(it.key)){
            toast("Ya votaste este tema. Volvé mañana 🙌");
            return;
          }

          try{
            const votosRef = ref(db, "temas/" + it.key + "/votos");
            await runTransaction(votosRef, (cur)=> (Number(cur)||0) + 1);
            lockVote(it.key);
            vote.disabled = true;
            toast("✅ Voto registrado. ¡Gracias!");
          }catch(err){
            console.error(err);
            toast("❌ No pude registrar el voto");
          }
        });

        row.appendChild(num);
        row.appendChild(playBtn);
        row.appendChild(meta);
        row.appendChild(tr);
        row.appendChild(vote);

        listEl.appendChild(row);
      });

      savePrevOrder(newMap);
    }

    // 🔥 Firebase listener
    const temasRef = ref(db, "temas");

    onValue(temasRef, (snap)=>{
      const val = snap.val() || {};
      const items = Object.entries(val).map(([key, data])=>{
        return { key, ...(data||{}) };
      });

      // Orden: votos desc (si no hay votos, 0)
      items.sort((a,b)=> (Number(b.votos)||0) - (Number(a.votos)||0));

      render(items);
    }, (err)=>{
      console.error(err);
      toast("❌ Error conectando con Firebase");
    });

    // Si termina el audio, vuelve icono play
    player.addEventListener("ended", ()=>{
      currentKeyPlaying = null;
      document.querySelectorAll(".playBtn > div").forEach(d=>{
        d.className = "playIcon";
        d.innerHTML = "";
      });
    });

    // Debug visible si algo explota (para que no quedes a ciegas)
    window.addEventListener("error", (e)=>{
      console.error("ERROR JS:", e.message || e);
      toast("⚠️ Error JS (mirá consola)");
    });
    window.addEventListener("unhandledrejection", (e)=>{
      console.error("PROMISE REJECTED:", e.reason || e);
      toast("⚠️ Error (promesa rechazada)");
    });
  </script>
</body>
</html>
